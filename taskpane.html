<!DOCTYPE html>
<html>

<head>
    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>
    <p>This add-in will insert the text 'Hello Mario Soares!' or not.</p>
    <button id="helloButton">Say hello</button>

    <!-- The following image URL tracks diagnostic data for this sample add-in. Please remove the image tag if you reuse this sample in your own code project. -->
    <img src="https://pnptelemetry.azurewebsites.net/pnp-officeaddins/samples/outlook-add-in-hello-world-run" />
</body>

<script>

    Office.onReady((info) => {
        if (info.host === Office.HostType.Outlook) {
            document.getElementById("helloButton").onclick = sayHello2;
        }
    });

    /**
     * Writes 'Hello world!' to a new message body.
     */
    function sayHello() {
        Office.context.mailbox.item.body.setAsync(
            "Hello asdaaaaaaaaaaaaaaa!",
            {
                coercionType: "html", // Write text as HTML
            },

            // Callback method to check that setAsync succeeded
            function (asyncResult) {
                if (asyncResult.status ==
                    Office.AsyncResultStatus.Failed) {
                    write(asyncResult.error.message);
                }
            }
        );
    }

    function myHandlerFunction(eventarg) {
        console.log(eventarg);
        if (eventarg.attachmentStatus === Office.MailboxEnums.AttachmentStatus.Added) {
            const attachment = eventarg.attachmentDetails;
            console.log("Event Fired and Attachment Added!");
            getAttachmentContentAsync(attachment.id, options, callback);
        }
    }

    function mycallback(result) {
        console.log(result.error);
    }

    function printRecipients() {
        var emailToRecipients = Office.context.mailbox.item.to;
        for (var i = 0; i < emailToRecipients.length; i++) {
            console.log("Recipient: " + emailToRecipients[i].displayName + " <" + emailToRecipients[i].emailAddress + ">");
        }
    }

    // This function will run when the add-in is activated
    function sayHello2() {
        // Get the current context
        var context = Office.context;
        
        Office.context.mailbox.item.addHandlerAsync(Office.EventType.ItemChanged, myHandlerFunction, mycallback);

        Office.context.mailbox.item.to.getAsync(
            function (asyncResult) {
                if (asyncResult.status === "succeeded") {
                    var recipients = asyncResult.value;
                    console.log("Recipients: ", recipients);

                    if (recipients.length > 0) {
                        // Build the greeting
                        var greeting = "Hello";
                        for (var i = 0; i < recipients.length; i++) {
                            greeting += " " + recipients[i].displayName + ",";
                        }
                        greeting += "\n\n";
                        console.log("Greeting: ", greeting);
                        // ... rest of the code ...
                    } else {
                        console.error("No recipients found");
                    }
                } else {
                    console.error("Failed to retrieve recipients: " + asyncResult.error.message);
                }
            });


        console.log("context.mailbox.item: ", context.mailbox.item);
        // Check if the context is a reply message
        if (context.mailbox.item.itemType === Office.MailboxEnums.ItemType.Message) {
            // Get the recipients of the reply message
            var recipients = context.mailbox.item.to;

            // Build the greeting
            var greeting = "Hello ";
            for (var i = 0; i < recipients.length; i++) {
                greeting += " " + recipients[i].displayName + ",";
            }
            greeting += "\n\n";

            // Insert the greeting into the reply message body
            Office.context.mailbox.item.body.setSelectedDataAsync(
            greeting,
            {
                coercionType: Office.CoercionType.Text,
                asyncContext: {}
            },
            function(asyncResult) {
                if (asyncResult.status === Office.AsyncResultStatus.Failed) {
                console.error(asyncResult.error.message);
                }
            }
            );
        }
    }

</script>

</html>
